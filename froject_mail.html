<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Froject</title>
<style>
:root{
  --bg:#070A0F; --surface:#0F1722; --card:#121A26; --card-hi:#16202e;
  --accent:#00FF88; --accent-d:#00cc6e; --glow:rgba(0,255,136,.45); --glow-soft:rgba(0,255,136,.15);
  --cyan:#00e0c6; --text:#e9f3ee; --dim:#7d8a86; --faint:#4a5550;
  --border:#1c2733; --border-hi:#26333f; --ease:cubic-bezier(0.22,1,0.36,1);
  /* density tokens (Detailed default) */
  --row-pad:16px; --row-gap:5px; --list-w:480px; --sb-w:280px;
  --radius:14px; --avatar:50px; --reader-pad:30px 44px 60px; --content-fs:16.5px;
}
[data-density="compact"]{
  --row-pad:10px; --row-gap:2px; --list-w:400px; --sb-w:248px;
  --radius:11px; --avatar:42px; --reader-pad:20px 30px 44px; --content-fs:15px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:var(--bg);color:var(--text);}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(70% 55% at 80% -5%, rgba(0,255,136,.10), transparent 60%),radial-gradient(60% 50% at 0% 100%, rgba(0,224,198,.07), transparent 55%);}
button{font-family:inherit;cursor:pointer;border:none;outline:none;}
input,textarea,select{font-family:inherit;outline:none;}
::selection{background:var(--glow);color:#06120c;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#1e2a36;border-radius:9px;}
::-webkit-scrollbar-thumb:hover{background:#2a3946;}

/* logo image */
.logo-img{display:block;object-fit:contain;image-rendering:-webkit-optimize-contrast;}

/* ============ WELCOME ============ */
.welcome{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(80% 70% at 50% 0%, #0b1620, var(--bg) 70%);
  transition:opacity .7s var(--ease),filter .7s var(--ease),transform .7s var(--ease);padding:20px;overflow-y:auto;}
.welcome.hide{opacity:0;filter:blur(20px);transform:scale(1.08);pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;pointer-events:none;animation:float 14s ease-in-out infinite;}
.orb.a{width:400px;height:400px;background:rgba(0,255,136,.25);top:-80px;left:8%;}
.orb.b{width:340px;height:340px;background:rgba(0,224,198,.18);bottom:-60px;right:10%;animation-delay:-7s;}
@keyframes float{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,40px);}}
.lang-bar{position:absolute;top:24px;right:24px;display:flex;gap:8px;z-index:5;}
.lang-btn{background:rgba(18,26,38,.7);border:1px solid var(--border);color:var(--dim);padding:8px 14px;border-radius:10px;font-size:14px;display:flex;align-items:center;gap:7px;transition:all .3s var(--ease);backdrop-filter:blur(10px);}
.lang-btn.on{color:var(--text);border-color:var(--accent);box-shadow:0 0 18px var(--glow-soft);}
.lang-btn:hover{transform:translateY(-1px);color:var(--text);}
.welcome-card{width:440px;max-width:100%;position:relative;z-index:2;animation:rise .8s var(--ease) both;}
@keyframes rise{from{opacity:0;transform:translateY(36px) scale(.97);}to{opacity:1;transform:none;}}
.brand{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;}
.brand .mark{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px var(--glow);padding:9px;}
.brand .mark img{width:100%;height:100%;}
.brand h1{font-size:30px;font-weight:700;letter-spacing:-.02em;}
.welcome-sub{text-align:center;color:var(--dim);font-size:15.5px;margin-bottom:34px;line-height:1.5;}
.tabs{display:flex;gap:6px;background:var(--surface);padding:5px;border-radius:13px;margin-bottom:22px;border:1px solid var(--border);}
.tab{flex:1;padding:11px;border-radius:9px;background:none;color:var(--dim);font-size:14.5px;font-weight:600;transition:all .3s var(--ease);}
.tab.on{background:var(--card-hi);color:var(--text);box-shadow:0 0 0 1px var(--border-hi);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;color:var(--dim);margin-bottom:7px;}
.field input,.field select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px 15px;color:var(--text);font-size:15px;transition:all .3s var(--ease);}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow-soft),0 0 24px var(--glow-soft);}
.btn-primary{width:100%;padding:15px;border-radius:12px;font-size:15.5px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#04130a;box-shadow:0 0 28px var(--glow);transition:all .3s var(--ease);margin-top:6px;}
.btn-primary:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 0 42px var(--glow);}
.btn-primary:active{transform:scale(.98);}
.divider{display:flex;align-items:center;gap:14px;margin:22px 0;color:var(--faint);font-size:12.5px;}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border);}
.btn-demo{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:600;background:transparent;color:var(--accent);border:1px solid var(--accent);position:relative;overflow:hidden;transition:all .3s var(--ease);display:flex;align-items:center;justify-content:center;gap:9px;}
.btn-demo:hover{box-shadow:0 0 30px var(--glow-soft);background:var(--glow-soft);transform:translateY(-2px);}
.btn-demo svg{width:18px;height:18px;}

/* ============ APP ============ */
.app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;opacity:0;transition:opacity .7s var(--ease) .15s;}
.app.show{opacity:1;}
.topbar{flex:0 0 60px;display:flex;align-items:center;gap:16px;padding:0 22px;border-bottom:1px solid var(--border);background:rgba(15,23,34,.55);backdrop-filter:blur(16px);position:relative;z-index:6;}
.hamburger{display:none;width:40px;height:40px;border-radius:10px;background:var(--surface);border:1px solid var(--border);align-items:center;justify-content:center;color:var(--text);flex:0 0 40px;}
.hamburger svg{width:20px;height:20px;}
.topbar .mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--glow-soft);padding:6px;flex:0 0 36px;}
.topbar .mark img{width:100%;height:100%;}
.topbar .name{font-weight:700;font-size:18px;letter-spacing:-.01em;color:#FFFFFF;}
.top-spacer{flex:1;}
.top-search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:9px 14px;width:300px;transition:all .3s var(--ease);}
.top-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow-soft);}
.top-search svg{width:16px;height:16px;color:var(--dim);}
.top-search input{flex:1;min-width:0;background:none;border:none;color:var(--text);font-size:14px;}
.top-search input::placeholder{color:var(--dim);}
.icon-btn{width:40px;height:40px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);transition:all .25s var(--ease);flex:0 0 40px;}
.icon-btn:hover{color:var(--accent);border-color:var(--border-hi);}
.icon-btn svg{width:19px;height:19px;}
.lang-toggle{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--dim);font-size:13.5px;transition:all .3s var(--ease);}
.lang-toggle:hover{color:var(--text);border-color:var(--border-hi);}
.user-chip{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));color:#04130a;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;box-shadow:0 0 16px var(--glow-soft);cursor:pointer;transition:transform .3s var(--ease);overflow:hidden;flex:0 0 38px;}
.user-chip:hover{transform:scale(1.06);}
.user-chip img{width:100%;height:100%;object-fit:cover;}

.main{flex:1;display:flex;min-height:0;position:relative;z-index:1;}
.scrim{display:none;position:fixed;inset:0;background:rgba(3,6,10,.6);z-index:14;backdrop-filter:blur(2px);}
.scrim.show{display:block;animation:fadeIn .3s var(--ease);}

.sidebar{flex:0 0 var(--sb-w);border-right:1px solid var(--border);padding:20px 16px;overflow-y:auto;background:rgba(15,23,34,.35);transition:flex-basis .3s var(--ease);}
.compose{width:100%;display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#04130a;font-size:15px;font-weight:700;margin-bottom:20px;box-shadow:0 0 24px var(--glow-soft);transition:all .3s var(--ease);}
.compose:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 0 38px var(--glow);}
.compose:active{transform:scale(.98);}
.compose svg{width:18px;height:18px;}
.nav-item{display:flex;align-items:center;padding:11px 14px;border-radius:10px;font-size:15px;color:var(--text);margin-bottom:3px;position:relative;overflow:hidden;transition:background .25s var(--ease),transform .2s var(--ease);}
.nav-item:hover{background:var(--card);transform:translateX(2px);}
.nav-item.active{background:var(--card-hi);box-shadow:inset 0 0 0 1px var(--border-hi);}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent);box-shadow:0 0 12px var(--glow);animation:slideGlow .4s var(--ease);}
@keyframes slideGlow{from{opacity:0;transform:scaleY(0);}to{opacity:1;transform:scaleY(1);}}
.nav-item .ic{width:18px;height:18px;margin-right:12px;color:var(--dim);flex:0 0 18px;}
.nav-item.active .ic{color:var(--accent);}
.nav-item .label{flex:1;}
.nav-item .count{font-size:12.5px;color:var(--dim);background:var(--surface);padding:2px 8px;border-radius:8px;}
.nav-item.active .count{color:var(--accent);background:var(--glow-soft);}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--faint);margin:24px 0 10px 14px;}
.label-item{display:flex;align-items:center;gap:11px;padding:9px 14px;border-radius:10px;font-size:14.5px;transition:all .25s var(--ease);}
.label-item:hover{background:var(--card);transform:translateX(2px);}
.label-item.active{background:var(--card-hi);}
.dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;}
.dot.work{background:var(--accent);box-shadow:0 0 8px var(--glow);}
.dot.personal{background:var(--cyan);box-shadow:0 0 8px rgba(0,224,198,.5);}
.dot.travel{background:#f5a623;box-shadow:0 0 8px rgba(245,166,35,.5);}
.dot.finance{background:#36d1ff;box-shadow:0 0 8px rgba(54,209,255,.5);}
.sb-bottom{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.stat-card{margin-top:20px;padding:18px;border-radius:14px;background:var(--card);position:relative;overflow:hidden;border:1px solid var(--border);}
.stat-card::before{content:"";position:absolute;inset:-1px;border-radius:14px;padding:1px;background:linear-gradient(135deg,var(--glow),transparent 60%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.stat-card .st-label{font-size:12px;color:var(--dim);margin-bottom:10px;}
.stat-ring{display:flex;align-items:center;gap:14px;}
.ring{width:58px;height:58px;flex:0 0 58px;}
.ring circle{fill:none;stroke-width:6;}
.ring .bg{stroke:var(--surface);}
.ring .fg{stroke:var(--accent);stroke-linecap:round;filter:drop-shadow(0 0 4px var(--glow));transition:stroke-dashoffset 1.2s var(--ease);}
.stat-pct{font-size:24px;font-weight:700;}
.stat-cap{font-size:12.5px;color:var(--dim);}

/* mail content area */
.content{flex:1;display:flex;min-width:0;}
.view-mail{flex:1;display:flex;min-width:0;}
.list-pane{flex:0 0 var(--list-w);border-right:1px solid var(--border);display:flex;flex-direction:column;min-width:0;transition:flex-basis .3s var(--ease);}
.list-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.list-head .lh-title{font-size:19px;font-weight:700;}
.list-head .lh-count{font-size:13px;color:var(--dim);}
.list{flex:1;overflow-y:auto;}
.mail-row{padding:var(--row-pad) 22px;border-bottom:1px solid var(--border);position:relative;transition:background .2s var(--ease);animation:fadeRow .4s var(--ease) both;}
@keyframes fadeRow{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.mail-row:hover{background:var(--card);}
.mail-row.active{background:var(--card-hi);}
.mail-row.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);box-shadow:0 0 14px var(--glow);}
.mail-row.unread .mail-sender{font-weight:700;}
.mail-row.unread::after{content:"";position:absolute;right:22px;top:18px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--glow);}
.mail-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:var(--row-gap);}
.mail-sender{font-size:15.5px;font-weight:600;}
.mail-time{font-size:12.5px;color:var(--dim);margin-left:12px;flex:0 0 auto;}
.mail-subject{font-size:14.5px;margin-bottom:var(--row-gap);font-weight:500;}
.mail-preview{font-size:13.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
[data-density="compact"] .mail-preview{display:none;}
.list-empty{padding:60px 22px;text-align:center;color:var(--faint);font-size:15px;}
.reader{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}
.reader-tb{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:16px 26px;border-bottom:1px solid var(--border);}
.back-btn{display:none;width:38px;height:38px;border-radius:10px;align-items:center;justify-content:center;color:var(--text);background:var(--card);margin-right:4px;}
.back-btn svg{width:20px;height:20px;}
.tbtn{width:40px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--dim);background:none;transition:all .25s var(--ease);}
.tbtn:hover{background:var(--card);color:var(--accent);box-shadow:0 0 16px var(--glow-soft);}
.tbtn:active{transform:scale(.92);}
.tbtn svg{width:19px;height:19px;}
.tb-sp{flex:1;}
.reader-body{flex:1;overflow-y:auto;padding:var(--reader-pad);animation:fadeUp .5s var(--ease);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.reader-head{display:flex;gap:16px;margin-bottom:26px;}
.avatar{width:var(--avatar);height:var(--avatar);border-radius:50%;flex:0 0 var(--avatar);display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:700;color:#04130a;box-shadow:0 0 18px var(--glow-soft);}
.r-from{font-size:23px;font-weight:700;margin-bottom:4px;}
.r-meta{font-size:14px;color:var(--dim);margin-bottom:11px;}
.r-pill{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px;padding:5px 13px;border-radius:9px;}
.summary{position:relative;border-radius:15px;padding:20px 22px;margin-bottom:30px;display:flex;gap:14px;background:var(--card);overflow:hidden;}
.summary::before{content:"";position:absolute;inset:0;border-radius:15px;padding:1px;background:linear-gradient(120deg,var(--glow),transparent 55%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.summary .sp{width:20px;height:20px;flex:0 0 20px;color:var(--accent);margin-top:1px;filter:drop-shadow(0 0 6px var(--glow));}
.summary-title{font-size:15.5px;font-weight:700;margin-bottom:7px;}
.summary-text{font-size:14.5px;color:var(--dim);line-height:1.6;}
.reader-content{font-size:var(--content-fs);line-height:1.78;}
.reader-content p{margin-bottom:18px;}
.reader-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--faint);gap:16px;}
.reader-empty svg{width:60px;height:60px;opacity:.35;}

/* ============ SETTINGS PAGE ============ */
.page{flex:1;overflow-y:auto;padding:40px;animation:fadeUp .5s var(--ease);}
.page-inner{max-width:760px;margin:0 auto;}
.page h2{font-size:28px;font-weight:700;margin-bottom:6px;}
.page .page-sub{color:var(--dim);font-size:15px;margin-bottom:32px;}
.set-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:26px;margin-bottom:22px;position:relative;overflow:hidden;}
.set-section::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,var(--glow-soft),transparent 55%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.set-h{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--accent);margin-bottom:18px;text-transform:uppercase;}
.density-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.density-opt{border:1px solid var(--border);border-radius:13px;padding:18px;cursor:pointer;transition:all .3s var(--ease);background:var(--surface);}
.density-opt:hover{border-color:var(--border-hi);transform:translateY(-2px);}
.density-opt.on{border-color:var(--accent);box-shadow:0 0 24px var(--glow-soft);background:var(--card-hi);}
.density-opt .do-title{font-size:16px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.density-opt.on .do-title{color:var(--accent);}
.density-opt .do-desc{font-size:13px;color:var(--dim);line-height:1.5;}
.dpreview{margin-top:14px;height:46px;border-radius:8px;background:var(--bg);border:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:5px;}
.dpreview span{height:6px;background:var(--border-hi);border-radius:3px;}
.density-opt.compact-prev .dpreview{gap:3px;}
.density-opt.compact-prev .dpreview span{height:4px;}

/* profile */
.prof-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);gap:16px;}
.prof-row:last-child{border-bottom:none;}
.prof-row .pr-label{font-size:14px;color:var(--dim);flex:0 0 auto;}
.prof-row input,.prof-row select{flex:1;max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14.5px;transition:all .3s var(--ease);}
.prof-row input:focus,.prof-row select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow-soft);}
.avatar-block{display:flex;align-items:center;gap:20px;margin-bottom:8px;}
.big-avatar{width:84px;height:84px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:#04130a;box-shadow:0 0 24px var(--glow-soft);overflow:hidden;flex:0 0 84px;}
.big-avatar img{width:100%;height:100%;object-fit:cover;}
.dropzone{flex:1;border:1.5px dashed var(--border-hi);border-radius:13px;padding:18px;text-align:center;color:var(--dim);font-size:13.5px;cursor:pointer;transition:all .3s var(--ease);}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--glow-soft);color:var(--text);box-shadow:0 0 24px var(--glow-soft);}
.dropzone svg{width:24px;height:24px;margin-bottom:8px;color:var(--accent);}
.dropzone b{color:var(--accent);}
.save-bar{display:flex;justify-content:flex-end;gap:10px;margin-top:8px;}
.acct-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.acct-stat{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:16px;}
.acct-stat .as-num{font-size:24px;font-weight:700;margin-bottom:3px;}
.acct-stat .as-num.green{color:var(--accent);}
.acct-stat .as-cap{font-size:12.5px;color:var(--dim);}

/* ============ WELCOME BANNER MODAL ============ */
.overlay{position:fixed;inset:0;background:rgba(3,6,10,.7);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(6px);padding:20px;overflow-y:auto;}
.overlay.show{display:flex;animation:fadeIn .35s var(--ease);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.cmodal{width:620px;max-width:100%;background:var(--surface);border-radius:16px;overflow:hidden;position:relative;animation:popIn .45s var(--ease);}
@keyframes popIn{from{opacity:0;transform:translateY(24px) scale(.96);}to{opacity:1;transform:none;}}
.cmodal::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,var(--glow),transparent 50%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.cm-head{display:flex;align-items:center;justify-content:space-between;padding:17px 22px;border-bottom:1px solid var(--border);}
.cm-head .t{font-weight:700;font-size:16px;}
.cm-close{color:var(--dim);font-size:24px;line-height:1;background:none;}
.cm-close:hover{color:var(--accent);}
.cm-field{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--border);}
.cm-field label{color:var(--dim);font-size:14px;width:54px;}
.cm-field input{flex:1;background:none;border:none;color:var(--text);font-size:15px;}
.cm-body{padding:18px 22px;}
.cm-body textarea{width:100%;min-height:190px;background:none;border:none;color:var(--text);font-size:15px;line-height:1.6;resize:vertical;}
.cm-foot{padding:15px 22px;display:flex;justify-content:flex-end;gap:10px;border-top:1px solid var(--border);}
.btn-send{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#04130a;font-weight:700;border-radius:11px;padding:12px 26px;font-size:14.5px;box-shadow:0 0 22px var(--glow-soft);transition:all .3s var(--ease);}
.btn-send:hover{transform:translateY(-2px);box-shadow:0 0 34px var(--glow);}
.btn-ghost{background:var(--card);color:var(--text);border-radius:11px;padding:12px 20px;font-size:14.5px;transition:all .3s var(--ease);}
.btn-ghost:hover{background:var(--card-hi);}

/* welcome banner */
.banner{width:680px;max-width:100%;background:var(--surface);border-radius:20px;overflow:hidden;position:relative;animation:bannerIn .6s var(--ease);}
@keyframes bannerIn{from{opacity:0;transform:translateY(40px) scale(.95);}to{opacity:1;transform:none;}}
.banner::before{content:"";position:absolute;inset:0;border-radius:20px;padding:1.5px;background:linear-gradient(135deg,var(--accent),transparent 45%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
.banner-orb{position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(0,255,136,.18);filter:blur(70px);top:-100px;right:-60px;pointer-events:none;}
.banner-inner{padding:38px 38px 32px;position:relative;}
.banner .b-badge{display:inline-flex;align-items:center;gap:7px;background:var(--glow-soft);color:var(--accent);font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:9px;margin-bottom:18px;opacity:0;animation:stag .6s var(--ease) .1s forwards;}
.banner .b-badge img{width:15px;height:15px;}
.banner h2{font-size:25px;font-weight:700;line-height:1.25;margin-bottom:14px;opacity:0;animation:stag .6s var(--ease) .2s forwards;}
.banner p{color:var(--dim);font-size:15px;line-height:1.6;margin-bottom:24px;opacity:0;animation:stag .6s var(--ease) .3s forwards;}
@keyframes stag{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.shots{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.shot{border-radius:13px;overflow:hidden;border:1px solid var(--border);background:var(--card);aspect-ratio:16/10;position:relative;opacity:0;animation:shotIn .7s var(--ease) forwards;}
.shot:nth-child(1){animation-delay:.4s;}
.shot:nth-child(2){animation-delay:.55s;}
@keyframes shotIn{from{opacity:0;transform:translateY(24px) scale(.94);}to{opacity:1;transform:none;}}
.shot img{width:100%;height:100%;object-fit:cover;object-position:top left;}
.banner-actions{display:flex;gap:12px;opacity:0;animation:stag .6s var(--ease) .65s forwards;}
.banner-actions .btn-primary{margin:0;flex:1;}
.btn-dark{flex:0 0 auto;padding:15px 28px;border-radius:12px;font-size:15px;font-weight:600;background:var(--card);color:var(--dim);border:1px solid var(--border);transition:all .3s var(--ease);}
.btn-dark:hover{color:var(--text);background:var(--card-hi);}

.toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card-hi);border:1px solid var(--accent);color:var(--text);padding:13px 24px;border-radius:13px;font-size:14.5px;font-weight:600;opacity:0;pointer-events:none;transition:all .35s var(--ease);z-index:60;box-shadow:0 0 30px var(--glow-soft);display:flex;align-items:center;gap:10px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast svg{width:17px;height:17px;color:var(--accent);}

/* ============ RESPONSIVE ============ */
@media(max-width:1100px){
  :root{--list-w:360px;}
  .top-search{width:200px;}
}
@media(max-width:860px){
  .hamburger{display:flex;}
  .topbar{padding:0 16px;gap:12px;}
  .topbar .name{font-size:17px;}
  .top-search{display:none;}
  .sidebar{position:fixed;top:60px;bottom:0;left:0;width:84vw;max-width:320px;flex:none;z-index:15;transform:translateX(-105%);transition:transform .35s var(--ease);box-shadow:20px 0 60px rgba(0,0,0,.5);}
  .sidebar.open{transform:translateX(0);}
  /* mail: show list OR reader */
  .view-mail{position:relative;}
  .list-pane{flex:1;width:100%;}
  .reader{position:absolute;inset:0;background:var(--bg);transform:translateX(100%);transition:transform .35s var(--ease);z-index:3;}
  .view-mail.reading .reader{transform:translateX(0);}
  .view-mail.reading .list-pane{display:none;}
  .back-btn{display:flex;}
  .reader-body{padding:22px 20px 50px;}
  .page{padding:24px 18px;}
  .density-grid{grid-template-columns:1fr;}
  .acct-stats{grid-template-columns:1fr;}
  .prof-row{flex-direction:column;align-items:stretch;}
  .prof-row input,.prof-row select{max-width:none;}
  .banner-inner{padding:26px 22px 24px;}
  .banner h2{font-size:21px;}
  .shots{grid-template-columns:1fr;}
  .banner-actions{flex-direction:column;}
  .btn-dark{padding:14px;}
}
@media(max-width:420px){
  .topbar .name{display:none;}
  .lang-toggle{padding:8px 10px;}
  .reader-tb{padding:12px 16px;gap:4px;}
  .welcome-card{padding:0;}
}
</style>

/* ============ HELPERS ============ */
function getList(){
  if(state.type==='label')return Object.values(mail).flat().filter(m=>m.label===state.view);
  if(state.view==='fav')return Object.values(mail).flat().filter(m=>m.fav);
  return mail[state.view]||[];
}
function counts(){return{inbox:mail.inbox.filter(m=>m.unread).length,fav:Object.values(mail).flat().filter(m=>m.fav).length,drafts:mail.drafts.length};}
function findMsg(id){return Object.values(mail).flat().find(m=>m.id===id);}
function currentName(){return T(state.view);}
function initial(){return (profile.name||'D').charAt(0).toUpperCase();}

/* ============ SIDEBAR ============ */
function renderSidebar(){
  const c=counts();
  document.getElementById('folders').innerHTML=folders.map(f=>{
    let cnt='';
    if(f.key==='inbox'&&c.inbox)cnt=`<span class="count">${c.inbox}</span>`;
    if(f.key==='fav'&&c.fav)cnt=`<span class="count">${c.fav}</span>`;
    if(f.key==='drafts'&&c.drafts)cnt=`<span class="count">${c.drafts}</span>`;
    const active=(state.page==='mail'&&state.type==='folder'&&state.view===f.key)?'active':'';
    return `<div class="nav-item ${active}" data-folder="${f.key}"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${f.ic}</svg><span class="label">${T(f.key)}</span>${cnt}</div>`;
  }).join('');
  document.getElementById('labelsBox').innerHTML=labelsList.map(l=>{
    const active=(state.page==='mail'&&state.type==='label'&&state.view===l.key)?'active':'';
    return `<div class="label-item ${active}" data-label="${l.key}"><span class="dot ${l.cls}"></span>${T(l.key)}</div>`;
  }).join('');
  document.querySelectorAll('[data-folder]').forEach(el=>el.onclick=()=>{state.page='mail';state.type='folder';state.view=el.dataset.folder;state.selectedId=null;state.reading=false;clearSearch();closeDrawer();render();});
  document.querySelectorAll('[data-label]').forEach(el=>el.onclick=()=>{state.page='mail';state.type='label';state.view=el.dataset.label;state.selectedId=null;state.reading=false;clearSearch();closeDrawer();render();});
  document.querySelector('[data-nav="settings"]').onclick=()=>{state.page='settings';closeDrawer();render();};
  document.querySelector('[data-nav="settings"]').classList.toggle('active',state.page==='settings');
}
function clearSearch(){state.search='';const s=document.getElementById('searchInput');if(s)s.value='';}

/* ============ CONTENT ROUTER ============ */
function render(){renderSidebar();const c=document.getElementById('content');state.page==='settings'?renderSettings(c):renderMail(c);}

/* ----- MAIL VIEW ----- */
function renderMail(c){
  c.innerHTML=`<div class="view-mail ${state.reading?'reading':''}" id="viewMail">
    <section class="list-pane">
      <div class="list-head"><span class="lh-title" id="lhTitle"></span><span class="lh-count" id="lhCount"></span></div>
      <div class="list" id="mailList"></div>
    </section>
    <section class="reader" id="reader"></section>
  </div>`;
  renderList();renderReader();
}
function renderList(){
  document.getElementById('lhTitle').textContent=currentName();
  let list=getList();
  if(state.search){const q=state.search.toLowerCase();list=list.filter(m=>(m.from+m.subject+m.preview).toLowerCase().includes(q));}
  document.getElementById('lhCount').textContent=list.length;
  const el=document.getElementById('mailList');
  if(!list.length){el.innerHTML=`<div class="list-empty">${T('empty')}</div>`;return;}
  el.innerHTML=list.map((m,i)=>`
    <div class="mail-row ${m.unread?'unread':''} ${state.selectedId===m.id?'active':''}" data-id="${m.id}" style="animation-delay:${i*40}ms">
      <div class="mail-top"><span class="mail-sender">${m.from}</span><span class="mail-time">${m.time}</span></div>
      <div class="mail-subject">${m.subject}</div>
      <div class="mail-preview">${m.preview}</div>
    </div>`).join('');
  el.querySelectorAll('.mail-row').forEach(r=>r.onclick=()=>{const id=+r.dataset.id;state.selectedId=id;state.reading=true;const m=findMsg(id);if(m)m.unread=false;render();});
}
function renderReader(){
  const el=document.getElementById('reader');
  const m=findMsg(state.selectedId);
  if(!m){el.innerHTML=`<div class="reader-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg><span>${T('pickMail')}</span></div>`;return;}
  const init=(m.from.replace(/^(Я|Черновик|Промо).*$/,'').trim()||m.from).charAt(0);
  const col=colorFor[m.from]||'#00FF88';
  el.innerHTML=`
    <div class="reader-tb">
      <button class="back-btn" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <button class="tbtn" data-act="reply"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17 4 12l5-5"/><path d="M4 12h11a5 5 0 0 1 5 5v1"/></svg></button>
      <button class="tbtn" data-act="forward"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 17 5-5-5-5"/><path d="M20 12H9a5 5 0 0 0-5 5v1"/></svg></button>
      <button class="tbtn" data-act="archive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg></button>
      <button class="tbtn" data-act="delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
      <span class="tb-sp"></span>
      <button class="tbtn" data-act="fav"><svg viewBox="0 0 24 24" fill="${m.fav?'currentColor':'none'}" stroke="currentColor" stroke-width="2" style="${m.fav?'color:var(--accent);filter:drop-shadow(0 0 6px var(--glow))':''}"><path d="m12 3 2.6 5.3 5.9.9-4.2 4.1 1 5.9L12 16.4 6.7 19.2l1-5.9L3.5 9.2l5.9-.9z"/></svg></button>
    </div>
    <div class="reader-body">
      <div class="reader-head">
        <div class="avatar" style="background:linear-gradient(135deg,${col},var(--cyan))">${init.toUpperCase()}</div>
        <div><div class="r-from">${m.from}</div><div class="r-meta">${T('me')} · ${m.time}</div>${m.label?`<span class="r-pill"><span class="dot ${labelsList.find(l=>l.key===m.label)?.cls||'work'}"></span>${T(m.label)}</span>`:''}</div>
      </div>
      ${m.summary?`<div class="summary"><svg class="sp" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.6L19.5 9l-5.7 1.4L12 16l-1.8-5.6L4.5 9l5.7-1.4L12 2z"/></svg><div><div class="summary-title">${T('summaryTitle')}</div><div class="summary-text">${m.summary}</div></div></div>`:''}
      <div class="reader-content">${m.body.map(p=>`<p>${p}</p>`).join('')}</div>
    </div>`;
  el.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>doAction(b.dataset.act,m));
  const bk=document.getElementById('backBtn');if(bk)bk.onclick=()=>{state.reading=false;render();};
}
function doAction(act,m){
  if(act==='reply'){openCompose('Re: '+m.subject,m.from.replace(/^Я → /,''));return;}
  if(act==='forward'){openCompose('Fwd: '+m.subject,'');return;}
  if(act==='fav'){m.fav=!m.fav;toast(m.fav?T('t_fav'):T('t_unfav'));render();return;}
  if(act==='archive'){moveMsg(m,'archive');toast(T('t_archive'));return;}
  if(act==='delete'){moveMsg(m,'trash');toast(T('t_trash'));return;}
}
function moveMsg(m,dest){for(const k in mail)mail[k]=mail[k].filter(x=>x.id!==m.id);mail[dest].unshift(m);state.selectedId=null;state.reading=false;render();}

  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('drag');}));
  dz.addEventListener('drop',e=>{if(e.dataTransfer.files[0])handleAvatar(e.dataTransfer.files[0]);});
  document.getElementById('profSave').onclick=()=>{
    profile.name=document.getElementById('pName').value||profile.name;
    profile.email=document.getElementById('pEmail').value||profile.email;
    const nl=document.getElementById('pLang').value;if(nl!==lang){lang=nl;applyI18n();}
    syncUser();toast(T('t_saved'));render();
  };
  document.getElementById('profCancel').onclick=()=>render();
}
function handleAvatar(file){
  if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();r.onload=e=>{profile.avatar=e.target.result;syncUser();render();toast(T('t_saved'));};r.readAsDataURL(file);
}
function syncUser(){
  const u=document.getElementById('userChip');
  u.innerHTML=profile.avatar?`<img src="${profile.avatar}">`:initial();
}

/* ============ COMPOSE ============ */
const overlay=document.getElementById('overlay');
function openCompose(subject='',to=''){document.getElementById('cmTo').value=to;document.getElementById('cmSubject').value=subject;document.getElementById('cmBody').value='';overlay.classList.add('show');}
function closeCompose(){overlay.classList.remove('show');}
document.getElementById('composeBtn').onclick=()=>{openCompose();closeDrawer();};
document.getElementById('cmClose').onclick=closeCompose;
overlay.onclick=e=>{if(e.target===overlay)closeCompose();};
document.getElementById('cmSend').onclick=()=>{
  const to=document.getElementById('cmTo').value||'(—)';const subject=document.getElementById('cmSubject').value||'(no subject)';const body=document.getElementById('cmBody').value||'';
  mail.sent.unshift({id:Date.now(),from:'Я → '+to,time:'now',subject,preview:body.slice(0,60)||'(no text)',label:'',unread:false,fav:false,summary:'Sent message.',body:body?body.split('\n'):['(empty)']});
  closeCompose();toast(T('t_sent'));if(state.page==='mail')render();
};
document.getElementById('cmDraft').onclick=()=>{
  const subject=document.getElementById('cmSubject').value||'(no subject)';const body=document.getElementById('cmBody').value||'';
  mail.drafts.unshift({id:Date.now(),from:'Черновик → ',time:'now',subject,preview:body.slice(0,60)||'(no text)',label:'',unread:false,fav:false,summary:'Draft.',body:body?body.split('\n'):['(empty)']});
  closeCompose();toast(T('t_draft'));if(state.page==='mail')render();
};
document.getElementById('searchInput').oninput=e=>{state.search=e.target.value;if(state.page==='mail')renderList();};

/* ============ DRAWER (mobile) ============ */
const sidebar=document.getElementById('sidebar'),scrim=document.getElementById('scrim');
function openDrawer(){sidebar.classList.add('open');scrim.classList.add('show');}
function closeDrawer(){sidebar.classList.remove('open');scrim.classList.remove('show');}
document.getElementById('hamburger').onclick=()=>sidebar.classList.contains('open')?closeDrawer():openDrawer();
scrim.onclick=closeDrawer;
document.getElementById('settingsTop').onclick=()=>{state.page='settings';render();};

/* ============ TOAST ============ */
let toastT;
function toast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2200);}

/* ============ I18N ============ */
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>el.placeholder=T(el.dataset.i18nPh));
  document.documentElement.lang=lang;
  document.getElementById('langToggle').textContent=lang==='ru'?'EN':'RU';
}
document.getElementById('langToggle').onclick=()=>{lang=lang==='ru'?'en':'ru';applyI18n();render();};

/* ============ STAT RING ============ */
function animateStat(pct){
  const ring=document.getElementById('ring');const circ=2*Math.PI*26;
  ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=circ;
  const pctEl=document.getElementById('statPct');
  requestAnimationFrame(()=>{ring.style.strokeDashoffset=circ*(1-pct/100);});
  let cur=0;const step=()=>{cur+=2;if(cur>=pct){pctEl.textContent=pct+'%';return;}pctEl.textContent=cur+'%';requestAnimationFrame(step);};step();
}

/* ============ WELCOME FLOW ============ */
document.querySelectorAll('.lang-btn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  lang=b.dataset.lang;applyI18n();
});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  document.getElementById('form-signin').style.display=t.dataset.tab==='signin'?'':'none';
  document.getElementById('form-create').style.display=t.dataset.tab==='create'?'':'none';
});
let isNewUser=false;
document.querySelectorAll('[data-act="enter"]').forEach(b=>b.onclick=()=>{
  if(b.dataset.new==='1'){const n=document.getElementById('suName').value.trim();if(n)profile.name=n;isNewUser=true;}
  enterApp();
});
document.querySelector('[data-act="demo"]').onclick=()=>{isNewUser=true;enterApp(true);};

function enterApp(demo){
  document.getElementById('welcome').classList.add('hide');
  setTimeout(()=>{
    document.getElementById('welcome').style.display='none';
    document.getElementById('app').classList.add('show');
    syncUser();render();animateStat(87);
    if(isNewUser)setTimeout(showBanner,650);
    else if(demo)setTimeout(()=>toast(T('welcomeToast')),500);
  },650);
}

/* ============ WELCOME BANNER ============ */
const bannerOverlay=document.getElementById('bannerOverlay');
function showBanner(){
  applyI18n();
  // re-trigger stagger animations
  bannerOverlay.classList.add('show');
}
function hideBanner(){bannerOverlay.classList.remove('show');}
document.getElementById('bannerLater').onclick=hideBanner;
document.getElementById('bannerGo').onclick=()=>{hideBanner();state.page='settings';render();toast(T('welcomeToast'));};

/* ============ INIT ============ */
function init(){state.selectedId=1;applyI18n();}
init();

/* back to landing site */
(function(){
  function go(){ window.location.href='index.html'; }
  var n=document.getElementById('backToSite');
  if(n) n.onclick=go;
  var marks=document.querySelectorAll('.topbar .mark');
  marks.forEach(function(m){ m.style.cursor='pointer'; m.title='На сайт Froject'; m.onclick=go; });
})();

</script>
</body>
</html>
